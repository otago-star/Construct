<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Manulea Construction Ltd</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
	<main>
	<section class="start-hero">
	  <div class="container">
		<img src="images/logo/logo.svg" alt="Logo" class="start-logo" onerror="this.onerror=null;this.src='images/logo/logo.png'">
		<h1>Welcome</h1>
		<p>Click below to enter the site.</p>
		<p><a class="btn" href="landing.html">Enter Site</a></p>
	  </div>
	</section>
  </main>

  <footer class="site-footer">
	<div class="container">
	  <p>&copy; <span id="year"></span> Father's Name</p>
	</div>
  </footer>

  <script>
	// Set current year
	document.getElementById('year').textContent = new Date().getFullYear();
	  // Stronger, darker orange background for the start page
	document.documentElement.style.setProperty('--page-bg','linear-gradient(180deg,#ff8a00 0%,#ff4b00 100%)');

	// Fade-then-navigate when Enter Site clicked
	const enter = document.querySelector('.btn');
	enter && enter.addEventListener('click', (e)=>{
	  e.preventDefault();
	  const overlay = document.getElementById('fadeOverlay');
	  if(overlay) overlay.classList.add('show');
	  setTimeout(()=> location.href = 'landing.html', 450);
	});
  </script>
</body>
</html>
