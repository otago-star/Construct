<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Project Two</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
  <header class="site-header">
	<div class="container nav">
	  <a class="brand" href="../../landing.html">
		<img src="../../images/logo/logo.svg" alt="Logo" class="logo" onerror="this.onerror=null;this.src='../../images/logo/logo.png'">
		<span class="brand-name">Father's Name</span>
	  </a>
	</div>
  </header>

  <main>
	<section class="projects">
	  <div class="container">
		<h1>Project Two</h1>
		<p>Details about project two.</p>

		<div class="gallery grid" data-project="project2">
		  <div class="grid-row"></div>
		</div>

		<div class="lightbox" aria-hidden="true">
		  <button class="close" aria-label="Close">✖</button>
		  <button class="prev" aria-label="Previous">◀</button>
		  <img src="" alt="">
		  <button class="next" aria-label="Next">▶</button>
		</div>

		<script>
		  (async function(){
			const gallery = document.querySelector('.gallery.grid[data-project="project2"]');
			if(!gallery) return;
			const row = gallery.querySelector('.grid-row');
			// Prefer SiteUtils manifest if available, otherwise fall back to local images
			let imgs = [];
			if(window.SiteUtils && typeof SiteUtils.getProjectImages === 'function'){
			  try{
				imgs = await SiteUtils.getProjectImages('project2') || [];
			  }catch(e){
				imgs = [];
			  }
			}
			if(!imgs.length){
			  // fallback to local numbered images if no manifest
			  const fallbackCount = 7;
			  for(let i=1;i<=fallbackCount;i++){
				const im = document.createElement('img');
				im.dataset.index = i-1;
				im.loading = 'lazy';
				// try multiple extensions before placeholder
				const trySources = [
				  `../../images/projects/project2/${i}.jpg`,
				  `../../images/projects/project2/${i}.jpeg`,
				  `../../images/projects/project2/${i}.png`,
				  `../../images/projects/project2/${i}.webp`
				];
				im.src = trySources[0];
				im._tryIndex = 0;
				im.onerror = function(){
				  this._tryIndex = (this._tryIndex || 0) + 1;
				  if(this._tryIndex < trySources.length){ this.src = trySources[this._tryIndex]; }
				  else { this.onerror=null; this.src='../../images/placeholder.svg'; }
				};
				row.appendChild(im);
			  }
			  imgs = Array.from(row.querySelectorAll('img')).map(n=>n.src);
			} else {
			  imgs.forEach((src,i)=>{
				const im = document.createElement('img');
				im.src = src;
				im.dataset.index = i;
				im.loading = 'lazy';
				row.appendChild(im);
			  });
			}

			const imgsEls = Array.from(row.querySelectorAll('img'));
			const lightbox = document.querySelector('.lightbox');
			const lbImg = lightbox.querySelector('img');
			let idx = 0;
			function open(i){ idx = i; lbImg.src = imgsEls[idx].src; lightbox.classList.add('open'); lightbox.setAttribute('aria-hidden','false'); }
			function close(){ lightbox.classList.remove('open'); lightbox.setAttribute('aria-hidden','true'); }
			function nav(delta){ if(!imgsEls.length) return; idx = (idx + delta + imgsEls.length) % imgsEls.length; lbImg.src = imgsEls[idx].src; }
			if(imgsEls.length > 0){
			  imgsEls.forEach((im,i)=>im.addEventListener('click',()=>open(i)));
			}
			lightbox.querySelector('.close').addEventListener('click',close);
			lightbox.querySelector('.prev').addEventListener('click',()=>nav(-1));
			lightbox.querySelector('.next').addEventListener('click',()=>nav(1));
			lightbox.addEventListener('click',e=>{ if(e.target===lightbox) close(); });
			document.addEventListener('keydown',e=>{ if(lightbox.classList.contains('open')){ if(e.key==='Escape') close(); if(e.key==='ArrowLeft') nav(-1); if(e.key==='ArrowRight') nav(1); } });
		  })();
		</script>
	  </div>
	</section>
  </main>
</body>
</html>
