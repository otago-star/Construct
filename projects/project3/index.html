<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Project Three</title>
  <link rel="stylesheet" href="../../styles.css">
</head>
<body>
	<header class="site-header">
	<div class="container nav">
	  <a class="brand" href="../../landing.html">
		<img src="../../images/logo/logo.svg" alt="Logo" class="logo" onerror="this.onerror=null;this.src='../../images/logo/logo.png'">
		<div class="brand-text"><div class="company">Manulea Construction Ltd</div><div class="person">Sione Laiva'a Manulea Jnr</div></div>
	  </a>
	</div>
  </header>

  <main>
	<section class="projects">
	  <div class="container">
		<h1>Project Three</h1>
		<p>Details about project three.</p>

		<div class="gallery masonry" data-project="project3">
		  <div class="grid-row"></div>
		</div>

		<div class="lightbox" aria-hidden="true">
		  <button class="close" aria-label="Close">✖</button>
		  <button class="prev" aria-label="Previous">◀</button>
		  <img src="" alt="">
		  <button class="next" aria-label="Next">▶</button>
		</div>

		<script>
		  (async function(){
			const gallery = document.querySelector('.gallery.masonry[data-project="project3"]');
			if(!gallery) return;
			const row = gallery.querySelector('.grid-row');
			const imgs = window.SiteUtils ? await SiteUtils.getProjectImages('project3') : [];
			if(imgs.length){
			  imgs.forEach((src,i)=>{
				const im = document.createElement('img');
				im.dataset.index = i;
				im.loading = 'lazy';
				im.src = src;
				row.appendChild(im);
			  });
			} else {
			  const fallbackCount = 6;
			  for(let i=1;i<=fallbackCount;i++){
				const im = document.createElement('img');
				im.dataset.index = i-1;
				im.loading = 'lazy';
				const base = '../../images/projects/project3/';
				const candidates = [
				  base + i + '.jpg',
				  base + i + '.jpeg',
				  base + i + '.png',
				  base + i + '.webp'
				];
				im._tryIndex = 0;
				im.src = candidates[0];
				im.onerror = function(){
				  this._tryIndex++;
				  if(this._tryIndex < candidates.length){ this.src = candidates[this._tryIndex]; }
				  else { this.onerror=null; this.src='../../images/placeholder.svg'; }
				};
				row.appendChild(im);
			  }
			}
			const imgsEls = Array.from(row.querySelectorAll('img'));
			const lightbox = document.querySelector('.lightbox');
			const lbImg = lightbox.querySelector('img');
			let idx = 0;
			function open(i){ idx = i; lbImg.src = imgsEls[idx].src; lightbox.classList.add('open'); lightbox.setAttribute('aria-hidden','false'); }
			function close(){ lightbox.classList.remove('open'); lightbox.setAttribute('aria-hidden','true'); }
			function nav(delta){ idx = (idx + delta + imgsEls.length) % imgsEls.length; lbImg.src = imgsEls[idx].src; }
			if(imgsEls.length > 0){ imgsEls.forEach((im,i)=>im.addEventListener('click',()=>open(i))); }
			lightbox.querySelector('.close').addEventListener('click',close);
			lightbox.querySelector('.prev').addEventListener('click',()=>nav(-1));
			lightbox.querySelector('.next').addEventListener('click',()=>nav(1));
			lightbox.addEventListener('click',e=>{ if(e.target===lightbox) close() });
			document.addEventListener('keydown',e=>{ if(lightbox.classList.contains('open')){ if(e.key==='Escape') close(); if(e.key==='ArrowLeft') nav(-1); if(e.key==='ArrowRight') nav(1); } });
		  })();
		</script>
	  </div>
	</section>
  </main>
</body>
</html>
