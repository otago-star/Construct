name: Deploy to Netlify

on:
  push:
	branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
	runs-on: ubuntu-latest
	steps:
	  - name: Checkout
		uses: actions/checkout@v4

	  - name: Setup Node.js
		uses: actions/setup-node@v4
		with:
		  node-version: '18'

	  - name: Install netlify-cli
		run: npm install -g netlify-cli@latest

	  - name: Build (no-op)
		run: echo "No build step defined; deploying repository root as site"

	  - name: Deploy to Netlify
		env:
		  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
		  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
		run: |
		  if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
			echo "Missing NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID secret" >&2
			exit 1
		  fi
		  netlify deploy --prod --dir=. --auth "$NETLIFY_AUTH_TOKEN" --site "$NETLIFY_SITE_ID"
